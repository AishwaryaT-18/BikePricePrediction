<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>CycleWise: Navigate Bike/Scooter Prices with Confidence</h1>
        <form action="/prediction" method="post">
            <label for="name">Bike Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="year">Year of Manufacture:</label>
            <input type="number" id="year" name="year" required>
            
            <label for="km_driven">Kilometers Driven:</label>
            <input type="number" id="km_driven" name="km_driven" required>
            
            <label for="seller_type">Seller Type:</label>
            <select id="seller_type" name="seller_type" required>
                <option value="Individual">Individual</option>
                <option value="Dealer">Dealer</option>
            </select>
            
            <label for="owner">Owner:</label>
            <select id="owner" name="owner" required>
                <option value="1st owner">1st owner</option>
                <option value="2nd owner">2nd owner</option>
                <option value="3rd owner">3rd owner</option>
                <option value="4th owner">4th owner</option>
            </select>
            
            <label for="ex_showroom_price">Ex-Showroom Price:</label>
            <input type="number" id="ex_showroom_price" name="ex_showroom_price" required>
            
            <input type="submit" value="Calculate Price">
        </form>
        <div class="output">
            {% if prediction_text %}
                <h2>{{ prediction_text }}</h2>
            {% endif %}
        </div>
    </div>
</body>
</html>
